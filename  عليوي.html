<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>هدية إلى علي • من حسين</title>
<style>
  :root{
    --black:#0a0a0c; --gray1:#151518; --gray2:#2a2a2e; --gray3:#44444a;
    --white:#f5f7; --silver:#c0c4cc; --glow:#ffffff;
    --shadow:0 20px 50px rgba(0,0,0,.6);
    --r:22px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent; margin:0; padding:0}
  html,body{height:100%; overflow:hidden}
  body{
    font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
    background:radial-gradient(ellipse at top, #1a1a1e 0%, #0a0a0c 50%, #000 100%);
    color:var(--white);
    display:grid; place-items:center;
    perspective:2000px;
  }

  /* خلفية 3D متحركة */
 .bg-3d{
    position:fixed; inset:0; z-index:0;
    background:
      radial-gradient(circle at 20% 30%, rgba(192,196,204,.08) 0%, transparent 50%),
      radial-gradient(circle at 80% 70%, rgba(192,196,204,.06) 0%, transparent 50%);
    animation:bgShift 20s ease infinite;
  }
  @keyframes bgShift{ 0%,100%{transform:scale(1) rotate(0deg)} 50%{transform:scale(1.1) rotate(2deg)} }

 .stage{position:relative; width:min(680px,94vw); z-index:1}

  /* البريد 3D */
 .envelope{
    position:relative; width:100%; aspect-ratio:16/10;
    transform-style:preserve-3d; transition:transform 1.2s cubic-bezier(0.68,-0.55,0.265,1.55);
    cursor:pointer;
  }
 .envelope.opened{ transform:rotateX(180deg) translateY(-20px); }

 .env-front,.env-back{
    position:absolute; inset:0; backface-visibility:hidden;
    border-radius:var(--r); box-shadow:var(--shadow);
    background:linear-gradient(145deg, var(--gray2), var(--gray1));
    border:1px solid rgba(255,255,255,.1);
  }
 .env-back{ transform:rotateX(180deg); }

 .env-flap{
    position:absolute; top:0; left:0; right:0; height:45%;
    background:linear-gradient(145deg, var(--gray3), var(--gray2));
    clip-path:polygon(0 0, 100% 0, 50% 100%);
    transform-origin:top; transition:transform 1s ease;
    box-shadow:0 10px 30px rgba(0,0,0,.5);
  }
 .envelope.opened.env-flap{ transform:rotateX(180deg); }

 .barcode{
    position:absolute; bottom:20px; left:20px; right:20px;
    height:60px; background:repeating-linear-gradient(90deg, #000 0px, #000 2px, #fff 2px, #fff 4px, #000 4px, #000 6px, #fff 6px, #fff 8px);
    border-radius:8px; padding:8px; display:flex; align-items:center; justify-content:center;
    font-family:monospace; font-size:11px; color:#000; font-weight:900;
  }
 .barcode::after{ content:"ALI-2009-HUSSEIN"; color:#000; background:#fff; padding:2px 8px; }

 .stamp{
    position:absolute; top:20px; right:20px; width:80px; height:80px;
    border:3px solid var(--silver); border-radius:50%;
    display:grid; place-items:center; font-size:24px;
    background:radial-gradient(circle, var(--gray3), var(--gray2));
    box-shadow:0 0 20px rgba(192,196,204,.3), inset 0 0 20px rgba(0,0,0,.5);
  }

  /* الرسالة داخل البريد */
 .letter{
    position:absolute; inset:15px; padding:30px 24px;
    background:linear-gradient(145deg, #1a1a1e, #0f0f12);
    border-radius:calc(var(--r) - 8px); border:1px solid rgba(255,255,255,.05);
    display:none; flex-direction:column; gap:14px;
    box-shadow:inset 0 0 40px rgba(0,0,0,.8);
  }
 .letter.show{ display:flex; animation:letterIn.8s cubic-bezier(0.34,1.56,0.64,1); }
  @keyframes letterIn{ from{ opacity:0; transform:translateY(40px) scale(.9); } to{ opacity:1; transform:translateY(0) scale(1); } }

 .letter h1{ font-size:clamp(20px,5vw,28px); background:linear-gradient(135deg, var(--white), var(--silver)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
 .letter p{ font-size:clamp(14px,3.5vw,17px); line-height:1.8; color:var(--silver); }

 .timer{
    display:flex; align-items:center; gap:10px; padding:12px 16px;
    background:rgba(255,255,255,.05); border-radius:12px; border:1px solid rgba(255,255,255,.1);
  }
 .timer-bar{ flex:1; height:6px; background:rgba(255,255,255,.1); border-radius:999px; overflow:hidden; }
 .timer-bar>i{ display:block; height:100%; width:100%; background:linear-gradient(90deg, var(--white), var(--silver)); transform-origin:left; animation:countdown 15s linear forwards; }
  @keyframes countdown{ from{transform:scaleX(1)} to{transform:scaleX(0)} }
 .timer-text{ font-weight:900; font-size:14px; min-width:45px; text-align:left; }

  /* الاختبار */
 .quiz{
    display:none; flex-direction:column; gap:16px;
    animation:quizIn.6s ease;
  }
 .quiz.show{ display:flex; }
  @keyframes quizIn{ from{ opacity:0; transform:translateX(30px); } to{ opacity:1; transform:translateX(0); } }

 .question{
    padding:20px; background:linear-gradient(145deg, var(--gray2), var(--gray1));
    border-radius:16px; border:1px solid rgba(255,255,255,.08);
    box-shadow:0 10px 30px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.05);
  }
 .question h3{ font-size:clamp(16px,4vw,20px); margin-bottom:14px; color:var(--white); }

 .options{ display:grid; gap:10px; }
 .opt{
    padding:14px 18px; background:linear-gradient(145deg, var(--gray3), var(--gray2));
    border:2px solid rgba(255,255,.1); border-radius:12px;
    font-size:15px; font-weight:800; color:var(--silver); cursor:pointer;
    transition:all.2s ease; text-align:center;
    box-shadow:0 6px 16px rgba(0,0,0,.3), inset 0 1px 0 rgba(255,255,255,.08);
    touch-action:manipulation;
  }
 .opt:active{ transform:scale(.97); box-shadow:0 3px 8px rgba(0,0,0,.3); }
 .opt.correct{ background:linear-gradient(145deg, #1a4d2e, #0d2818); border-color:#22c55e; color:#4ade80; }
 .opt.wrong{ background:linear-gradient(145deg, #4d1a1a, #2d0d0d); border-color:#ef4444; color:#f87171; }

  input.date-input{
    width:100%; padding:14px 18px; background:linear-gradient(145deg, var(--gray3), var(--gray2));
    border:2px solid rgba(255,255,255,.1); border-radius:12px;
    font-size:16px; font-weight:700; color:var(--white); text-align:center;
    box-shadow:0 6px 16px rgba(0,0,0,.3), inset 0 1px 0 rgba(255,255,255,.08);
  }
  input.date-input:focus{ outline:none; border-color:var(--silver); }

 .btn{
    padding:16px 24px; border:0; border-radius:14px; font-weight:900; font-size:16px;
    background:linear-gradient(145deg, var(--silver), var(--white)); color:var(--black);
    cursor:pointer; box-shadow:0 10px 30px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.3);
    transition:transform.1s ease; touch-action:manipulation;
  }
 .btn:active{ transform:scale(.96); }
 .btn.ghost{ background:transparent; color:var(--white); border:2px solid rgba(255,255,255,.2); }

 .result{
    padding:24px; background:linear-gradient(145deg, var(--gray2), var(--gray1));
    border-radius:16px; border:1px solid rgba(255,255,255,.1);
    text-align:center; box-shadow:0 15px 40px rgba(0,0,0,.5);
  }
 .result h2{ font-size:clamp(22px,6vw,32px); margin-bottom:12px; }
 .result p{ font-size:clamp(15px,4vw,18px); color:var(--silver); line-height:1.7; }

 .confetti{ position:fixed; inset:0; pointer-events:none; z-index:100; }
 .confetti span{ position:absolute; width:8px; height:8px; background:var(--silver); animation:fall 3s linear forwards; }
  @keyframes fall{ to{ transform:translateY(100vh) rotate(720deg); opacity:0; } }

 .hidden{ display:none!important; }
</style>
</head>
<body>
<div class="bg-3d"></div>

<div class="stage">
  <!-- البريد -->
  <div class="envelope" id="envelope">
    <div class="env-front">
      <div class="env-flap"></div>
      <div class="stamp">🎁</div>
      <div class="barcode"></div>
    </div>
    <div class="env-back">
      <div class="letter" id="letter">
        <h1>منور عليوي ✨</h1>
        <p>كل عام وانتة اخي وعضيدي وصديقي واخي<br>وربي يحفضك ويطول بعمرك ويدومك الي ان شاء الله</p>
        <div class="timer">
          <span>⏱️</span>
          <div class="timer-bar"><i></i></div>
          <span class="timer-text" id="timerText">5</span>
        </div>
      </div>
    </div>
  </div>

  <!-- الاختبار -->
  <div class="letter hidden" id="quizBox">
    <div id="quizContent"></div>
  </div>
</div>

<div class="confetti" id="confetti"></div>

<script>
(function(){
  var envelope = document.getElementById('envelope');
  var letter = document.getElementById('letter');
  var quizBox = document.getElementById('quizBox');
  var quizContent = document.getElementById('quizContent');
  var timerText = document.getElementById('timerText');
  var opened = false;
  var currentQ = 0;

  var questions = [
    {
      type: 'ask',
      text: 'شنو رايك نختبرك اختبار صداقة للذكرى؟',
      options: ['موافق 🤝', 'رفض 🤨']
    },
    {
      type: 'date',
      text: 'ما هي مواليد حسين؟',
      answer: '2009/11/27'
    },
    {
      type: 'choice',
      text: 'حسين لو حبيبتك؟',
      options: ['حسين طبعاً ', 'حبيبتي '],
      correct: 0
    },
    {
      type: 'choice',
      text: 'تحب حسين؟',
      options: ['نعم', 'اي'],
      correct: [0,1]
    },
    {
      type: 'choice',
      text: 'منو أول واحد تتصل بيه لو صار شي؟',
      options: ['حسين ', 'أهلي', 'صديق ثاني'],
      correct: 0
    },
    {
      type: 'choice',
      text: 'لو خيروك بين مليون دولار وحسين، شتختار ولك 🤨',
      options: ['حسين أغلى من الفلوس ', 'المليون '],
      correct: 0
    }
  ];

  // فتح البريد
  envelope.addEventListener('pointerdown', function(e){
    e.preventDefault();
    if(opened) return;
    opened = true;
    envelope.classList.add('opened');
    setTimeout(function(){
      letter.classList.add('show');
      startTimer();
    }, 800);
  }, {passive:false});

  function startTimer(){
    var sec = 5;
    var iv = setInterval(function(){
      sec--;
      timerText.textContent = sec;
      if(sec <= 0){
        clearInterval(iv);
        setTimeout(showQuiz, 500);
      }
    }, 1000);
  }

  function showQuiz(){
    letter.classList.remove('show');
    setTimeout(function(){
      envelope.style.display = 'none';
      quizBox.classList.remove('hidden');
      quizBox.classList.add('show');
      showQuestion(0);
    }, 400);
  }

  function showQuestion(idx){
    currentQ = idx;
    var q = questions[idx];
    var html = '<div class="quiz show"><div class="question"><h3>'+q.text+'</h3>';

    if(q.type === 'ask'){
      html += '<div class="options">';
      q.options.forEach(function(opt, i){
        html += '<div class="opt" data-idx="'+i+'">'+opt+'</div>';
      });
      html += '</div>';
    } else if(q.type === 'date'){
      html += '<input type="text" class="date-input" placeholder="YYYY/MM/DD" id="dateInput">';
      html += '<button class="btn" style="margin-top:12px" id="checkDate">تأكيد</button>';
    } else if(q.type === 'choice'){
      html += '<div class="options">';
      q.options.forEach(function(opt, i){
        html += '<div class="opt" data-idx="'+i+'">'+opt+'</div>';
      });
      html += '</div>';
    }
    html += '</div></div>';
    quizContent.innerHTML = html;

    attachEvents(q);
  }

  function attachEvents(q){
    if(q.type === 'ask'){
      document.querySelectorAll('.opt').forEach(function(btn){
        btn.addEventListener('pointerdown', function(e){
          e.preventDefault();
          var idx = parseInt(this.getAttribute('data-idx'));
          if(idx === 0){
            showQuestion(1);
          } else {
            showResult(false, 'اقبل كسي 😒');
          }
        });
      });
    } else if(q.type === 'date'){
      document.getElementById('checkDate').addEventListener('pointerdown', function(e){
        e.preventDefault();
        var val = document.getElementById('dateInput').value.trim();
        if(val === q.answer){
          this.textContent = 'صح! ✅';
          this.classList.add('correct');
          setTimeout(function(){ showQuestion(2); }, 800);
        } else {
          this.textContent = 'غلط! جرب مرة ثانية ❌';
          setTimeout(function(){ e.target.textContent = 'تأكيد'; }, 1500);
        }
      });
    } else if(q.type === 'choice'){
      document.querySelectorAll('.opt').forEach(function(btn){
        btn.addEventListener('pointerdown', function(e){
          e.preventDefault();
          var idx = parseInt(this.getAttribute('data-idx'));
          var isCorrect = Array.isArray(q.correct)? q.correct.includes(idx) : idx === q.correct;
          if(isCorrect){
            this.classList.add('correct');
            setTimeout(function(){
              if(currentQ < questions.length - 1){
                showQuestion(currentQ + 1);
              } else {
                showResult(true);
              }
            }, 800);
          } else {
            this.classList.add('wrong');
            setTimeout(function(){ btn.classList.remove('wrong'); }, 1000);
          }
        });
      });
    }
  }

  function showResult(passed, msg){
    var html = '<div class="result">';
    if(passed){
      html += '<h2>🎉 مبروك عليوي! 🎉</h2>';
      html += '<p>اخي🫂<br>انت فعلاً أخ وعضيد وصديق العمر<br>حسين يحبك ويفتخر بيك ❤️</p>';
      launchConfetti();
    } else {
      html += '<h2>'+(msg||'حاول مرة ثانية')+'</h2>';
      html += '<button class="btn" onclick="location.reload()">إعادة المحاولة</button>';
    }
    html += '</div>';
    quizContent.innerHTML = html;
  }

  function launchConfetti(){
    var container = document.getElementById('confetti');
    for(var i=0; i<100; i++){
      var span = document.createElement('span');
      span.style.left = Math.random()*100 + '%';
      span.style.top = '-10px';
      span.style.animationDelay = Math.random()*0.5 + 's';
      span.style.background = ['#fff','#c0c4cc','#808088'][Math.floor(Math.random()*3)];
      container.appendChild(span);
    }
    setTimeout(function(){ container.innerHTML=''; }, 4000);
  }
})();
</script>
</body>
</html>
